<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legal Tax & Law Q&A</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --border: #2a2e38; --text: #e7e9ee;
    --muted: #9aa0ac; --accent: #4f7cff; --accent-dark: #3a5cd6;
    --user-bubble: #1f2937; --bot-bubble: #12161d; --danger: #e05a5a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, "Segoe UI", Arial, sans-serif;
    background: var(--bg); color: var(--text); height: 100vh; display: flex;
  }
  .sidebar {
    width: 260px; background: var(--panel); border-right: 1px solid var(--border);
    padding: 20px 16px; display: flex; flex-direction: column; gap: 14px; flex-shrink: 0;
  }
  .sidebar h1 { font-size: 16px; margin: 0 0 4px; }
  .sidebar .status { font-size: 12px; color: var(--muted); }
  .example-btn {
    text-align: left; background: #1c202a; border: 1px solid var(--border); color: var(--text);
    padding: 10px 12px; border-radius: 8px; font-size: 13px; cursor: pointer; line-height: 1.4;
  }
  .example-btn:hover { border-color: var(--accent); }
  .clear-btn {
    margin-top: auto; background: transparent; border: 1px solid var(--danger); color: var(--danger);
    padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 13px;
  }
  .clear-btn:hover { background: rgba(224,90,90,0.1); }
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 18px; }
  .msg { max-width: 720px; }
  .msg.user { align-self: flex-end; }
  .bubble {
    padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap;
  }
  .msg.user .bubble { background: var(--user-bubble); }
  .msg.bot .bubble { background: var(--bot-bubble); border: 1px solid var(--border); }
  .citations { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
  .citation {
    border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 12px;
    background: #10131a; cursor: pointer;
  }
  .citation-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; color: var(--muted); }
  .citation-head .title { color: var(--text); font-weight: 600; }
  .citation-snippet { margin-top: 6px; color: var(--muted); display: none; }
  .citation.expanded .citation-snippet { display: block; }
  .citation a { color: var(--accent); text-decoration: none; }
  .citation a:hover { text-decoration: underline; }
  .composer {
    border-top: 1px solid var(--border); padding: 16px 24px; display: flex; gap: 10px; background: var(--panel);
  }
  textarea {
    flex: 1; resize: none; background: #10131a; border: 1px solid var(--border); color: var(--text);
    border-radius: 10px; padding: 12px 14px; font-size: 14px; font-family: inherit; height: 48px;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  .send-btn {
    background: var(--accent); border: none; color: white; padding: 0 22px; border-radius: 10px;
    cursor: pointer; font-size: 14px; font-weight: 600;
  }
  .send-btn:hover { background: var(--accent-dark); }
  .send-btn:disabled { background: #2a2e38; color: var(--muted); cursor: not-allowed; }
  .loading { display: flex; gap: 4px; padding: 4px 0; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.15s; } .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,80%,100% { opacity: 0.3; } 40% { opacity: 1; } }
  .mode-tag {
    display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-bottom: 8px;
    border: 1px solid var(--border); color: var(--muted);
  }
</style>
</head>
<body>

<div class="sidebar">
  <div>
    <h1>Legal Tax &amp; Law Q&amp;A</h1>
    <div class="status" id="statusLine">Checking backend...</div>
  </div>
  <div style="font-size:12px; color: var(--muted); margin-top: 6px;">Try an example</div>
  <button class="example-btn" onclick="askExample(this)">What is the standard for deducting an ordinary and necessary business expense?</button>
  <button class="example-btn" onclick="askExample(this)">Under what circumstances is a state allowed to tax a business with no physical presence in the state?</button>
  <button class="example-btn" onclick="askExample(this)">What is the difference between a capital asset and ordinary income asset under case law?</button>
  <button class="clear-btn" onclick="clearChat()">Clear conversation</button>
</div>

<div class="main">
  <div class="chat" id="chat"></div>
  <div class="composer">
    <textarea id="input" placeholder="Ask a question about the indexed legal documents..." onkeydown="handleKeydown(event)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendQuestion()">Send</button>
  </div>
</div>

<script>
const API_BASE = "http://localhost:8000";
const chatEl = document.getElementById("chat");
const inputEl = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
const statusLine = document.getElementById("statusLine");

async function checkHealth() {
  try {
    const res = await fetch(`${API_BASE}/api/health`);
    const data = await res.json();
    if (data.status === "ready") {
      statusLine.textContent = `${data.documents_indexed} docs · ${data.chunks_indexed} chunks indexed`;
    } else {
      statusLine.textContent = "Index not built — run backend/ingest.py";
      statusLine.style.color = "#e05a5a";
    }
  } catch (e) {
    statusLine.textContent = "Backend unreachable — is main.py running?";
    statusLine.style.color = "#e05a5a";
  }
}
checkHealth();

function handleKeydown(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendQuestion();
  }
}

function askExample(btn) {
  inputEl.value = btn.textContent;
  sendQuestion();
}

function clearChat() {
  chatEl.innerHTML = "";
}

function addUserMessage(text) {
  const div = document.createElement("div");
  div.className = "msg user";
  div.innerHTML = `<div class="bubble"></div>`;
  div.querySelector(".bubble").textContent = text;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function addLoadingMessage() {
  const div = document.createElement("div");
  div.className = "msg bot";
  div.id = "loadingMsg";
  div.innerHTML = `<div class="bubble"><div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function removeLoadingMessage() {
  const el = document.getElementById("loadingMsg");
  if (el) el.remove();
}

function addBotMessage(answer, citations, mode) {
  const div = document.createElement("div");
  div.className = "msg bot";

  const modeTag = document.createElement("div");
  modeTag.className = "mode-tag";
  modeTag.textContent = mode === "llm" ? "LLM-generated answer" : "Retrieval-only (no API key set)";

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = answer;

  div.appendChild(modeTag);
  div.appendChild(bubble);

  if (citations && citations.length) {
    const citWrap = document.createElement("div");
    citWrap.className = "citations";
    citations.forEach((c, i) => {
      const item = document.createElement("div");
      item.className = "citation";
      item.onclick = () => item.classList.toggle("expanded");

      const head = document.createElement("div");
      head.className = "citation-head";
      const pageStr = c.page ? `p. ${c.page}` : "";
      const linkHtml = c.url ? `<a href="${c.url}" target="_blank" onclick="event.stopPropagation()">source ↗</a>` : "";
      head.innerHTML = `<span class="title">[${i + 1}] ${c.doc_title}${pageStr ? " · " + pageStr : ""}</span>${linkHtml}`;

      const snippet = document.createElement("div");
      snippet.className = "citation-snippet";
      snippet.textContent = c.snippet;

      item.appendChild(head);
      item.appendChild(snippet);
      citWrap.appendChild(item);
    });
    div.appendChild(citWrap);
  }

  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

async function sendQuestion() {
  const question = inputEl.value.trim();
  if (!question) return;

  addUserMessage(question);
  inputEl.value = "";
  sendBtn.disabled = true;
  addLoadingMessage();

  try {
    const res = await fetch(`${API_BASE}/api/ask`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question, top_k: 5 }),
    });
    removeLoadingMessage();

    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: res.statusText }));
      addBotMessage(`Error: ${err.detail || "request failed"}`, [], "error");
      return;
    }

    const data = await res.json();
    addBotMessage(data.answer, data.citations, data.mode);
  } catch (e) {
    removeLoadingMessage();
    addBotMessage("Could not reach the backend. Confirm main.py is running on port 8000.", [], "error");
  } finally {
    sendBtn.disabled = false;
  }
}
</script>

</body>
</html>
